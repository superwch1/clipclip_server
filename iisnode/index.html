<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"DESKTOP-JOHN-21476-stderr-1714201459859.txt","computername":"DESKTOP-JOHN","pid":21476,"type":"stderr","created":1714201459859},{"file":"DESKTOP-JOHN-21476-stdout-1714201459858.txt","computername":"DESKTOP-JOHN","pid":21476,"type":"stdout","created":1714201459858},{"file":"DESKTOP-JOHN-23036-stderr-1714154838265.txt","computername":"DESKTOP-JOHN","pid":23036,"type":"stderr","created":1714154838265},{"file":"DESKTOP-JOHN-23036-stdout-1714154838265.txt","computername":"DESKTOP-JOHN","pid":23036,"type":"stdout","created":1714154838265},{"file":"DESKTOP-JOHN-24108-stderr-1714204276702.txt","computername":"DESKTOP-JOHN","pid":24108,"type":"stderr","created":1714204276702},{"file":"DESKTOP-JOHN-24108-stdout-1714204276701.txt","computername":"DESKTOP-JOHN","pid":24108,"type":"stdout","created":1714204276701},{"file":"DESKTOP-JOHN-24724-stdout-1714012382854.txt","computername":"DESKTOP-JOHN","pid":24724,"type":"stdout","created":1714012382854},{"file":"DESKTOP-JOHN-6152-stderr-1714201329591.txt","computername":"DESKTOP-JOHN","pid":6152,"type":"stderr","created":1714201329591},{"file":"DESKTOP-JOHN-6152-stdout-1714201329589.txt","computername":"DESKTOP-JOHN","pid":6152,"type":"stdout","created":1714201329589},{"file":"DESKTOP-JOHN-7696-stderr-1714200744894.txt","computername":"DESKTOP-JOHN","pid":7696,"type":"stderr","created":1714200744894},{"file":"DESKTOP-JOHN-7696-stdout-1714200744892.txt","computername":"DESKTOP-JOHN","pid":7696,"type":"stdout","created":1714200744892}];
        var lastUpdated = 1714204277490;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
