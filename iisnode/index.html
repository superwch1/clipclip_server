<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"DESKTOP-JOHN-11240-stderr-1725263811489.txt","computername":"DESKTOP-JOHN","pid":11240,"type":"stderr","created":1725263811489},{"file":"DESKTOP-JOHN-11240-stdout-1725263811488.txt","computername":"DESKTOP-JOHN","pid":11240,"type":"stdout","created":1725263811488},{"file":"DESKTOP-JOHN-9884-stderr-1725264560309.txt","computername":"DESKTOP-JOHN","pid":9884,"type":"stderr","created":1725264560309},{"file":"DESKTOP-JOHN-9884-stdout-1725264560309.txt","computername":"DESKTOP-JOHN","pid":9884,"type":"stdout","created":1725264560309},{"file":"DESKTOP-JOHN-9888-stderr-1724902986800.txt","computername":"DESKTOP-JOHN","pid":9888,"type":"stderr","created":1724902986800},{"file":"DESKTOP-JOHN-9888-stdout-1724902986799.txt","computername":"DESKTOP-JOHN","pid":9888,"type":"stdout","created":1724902986799}];
        var lastUpdated = 1725264561294;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
